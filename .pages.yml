# Pages CMS configuration (https://pagescms.org).
# Runs alongside keystatic.config.ts against the exact same content files -
# this does not replace Keystatic, it's a second admin UI for the same
# source of truth. Field names/types here are drawn directly from the same
# content audit keystatic.config.ts was built from, so both CMSs read and
# write byte-compatible JSON.
#
#
# One structural note: Pages CMS's native `block` field flattens the
# selected block's own fields directly onto the item (e.g.
# { discriminant: hero, title: ... }), but every real sections[] entry in
# this repo is { discriminant, value: { ... } } - one level deeper. Every
# block below wraps its fields in a single nested `value` object field to
# match that exactly, so saving through Pages CMS never reshapes existing
# content.
#
# Known gaps vs. the Keystatic config (Pages CMS has no equivalent):
# - No native color-picker field type - color-scheme fields are plain
#   strings with a hex regex pattern, no live swatch.
#
# Sidebar organization: content entries below are nested under two
# `type: group` headers (navigation-only, doesn't change file paths) -
# "Global Settings" for the singleton files and "Collections" for the
# collections, mirroring Keystatic's ui.navigation groupings.

media:
  - name: images
    label: Images
    input: public/images
    output: /images
  - name: logo
    label: Logo
    input: public/logo
    output: /logo

components:
  # ---- SEO/metadata block, reused by every page-like collection ----
  metadata:
    type: object
    label: SEO & Metadata
    fields:
      - name: title
        type: string
        label: Meta Title
      - name: description
        type: text
        label: "Meta Description (supports {{city}} interpolation)"
      - name: keywords
        type: string
        label: Keywords
      - name: noindex
        type: boolean
        label: No Index
      - name: robots
        type: object
        label: Robots Directives
        fields:
          - name: index
            type: boolean
            label: Index
          - name: follow
            type: boolean
            label: Follow
      - name: schema
        type: code
        label: "Schema.org JSON-LD (optional)"
      - name: sitemap
        type: boolean
        label: Include in Sitemap
      - name: openGraph
        type: object
        label: Open Graph
        fields:
          - name: type
            type: string
            label: Type
          - name: images
            type: block
            label: Images
            list: true
            blockKey: discriminant
            blocks:
              - name: local
                label: Local Image
                fields:
                  - name: value
                    type: object
                    fields:
                      - name: image
                        type: image
                        label: Image
                        options:
                          media: images
              - name: external
                label: External URL
                fields:
                  - name: value
                    type: object
                    fields:
                      - name: url
                        type: string
                        label: Image URL

  # ---- Smart Hybrid relationship fields shared by home hero cards and
  # navbar megamenu featured cards ----
  relatedLinkFields:
    type: object
    fields:
      - name: description
        type: text
        label: Description
      - name: href
        type: string
        label: "Link (fallback if no relationship below is set)"
      - name: solutionsFoundationalLink
        type: reference
        label: "Links to Solution - Foundational (optional)"
        required: false
        options:
          collection: solutionsFoundational
          value: "{path}"
          label: "{title}"
      - name: solutionsLeadGenLink
        type: reference
        label: "Links to Solution - Lead Gen (optional)"
        required: false
        options:
          collection: solutionsLeadGen
          value: "{path}"
          label: "{title}"
      - name: solutionsBrandingLink
        type: reference
        label: "Links to Solution - Branding (optional)"
        required: false
        options:
          collection: solutionsBranding
          value: "{path}"
          label: "{title}"
      - name: indoorBillboardLink
        type: reference
        label: "Links to Indoor Billboards Page (optional)"
        required: false
        options:
          collection: indoorBillboards
          value: "{path}"
          label: "{title}"

  # ---- The 11 real section types (sections[] discriminant/value) ----
  sections:
    type: block
    label: Sections
    list: true
    blockKey: discriminant
    blocks:
      - name: hero
        label: Hero
        fields:
          - name: value
            type: object
            fields:
              - name: title
                type: string
                label: Title
              - name: subtitle
                type: text
                label: Subtitle
              - name: badge
                type: string
                label: Badge
              - name: image
                type: image
                label: Image
                options:
                  media: images
              - name: imageAlt
                type: string
                label: Image Alt Text
              - name: buttonText
                type: string
                label: Button Text
              - name: buttonHref
                type: string
                label: Button Link

      - name: heroHome
        label: Home Hero
        fields:
          - name: value
            type: object
            fields:
              - name: title
                type: string
                label: Title
              - name: subtitle
                type: text
                label: Subtitle
              - name: badge
                type: string
                label: Badge
              - name: variant
                type: string
                label: Variant
              - name: cards
                type: object
                label: Cards
                list: true
                fields:
                  - component: relatedLinkFields

      - name: content
        label: Content Block
        fields:
          - name: value
            type: object
            fields:
              - name: title
                type: string
                label: Title
              - name: badge
                type: string
                label: Badge
              - name: description
                type: text
                label: Description
              - name: variant
                type: select
                label: Variant
                options:
                  values:
                    - name: two-column
                      label: Two Column
                    - name: image-card
                      label: Image Card
                    - name: simple
                      label: Simple
              - name: background
                type: select
                label: Background
                options:
                  values:
                    - name: primary-dark
                      label: Primary Dark
                    - name: primary
                      label: Primary
                    - name: gray
                      label: Gray
                    - name: white
                      label: White
              - name: image
                type: image
                label: Image
                options:
                  media: images
              - name: imageAlt
                type: string
                label: Image Alt Text
              - name: imagePosition
                type: select
                label: Image Position
                options:
                  values:
                    - name: left
                      label: Left
                    - name: right
                      label: Right
              - name: buttonText
                type: string
                label: Button Text
              - name: buttonHref
                type: string
                label: Button Link
              - name: features
                type: object
                label: Features
                list: true
                fields:
                  - name: icon
                    type: string
                    label: Icon
                  - name: text
                    type: text
                    label: Text

      - name: features
        label: Features
        fields:
          - name: value
            type: object
            fields:
              - name: title
                type: string
                label: Title
              - name: description
                type: text
                label: Description
              - name: badge
                type: string
                label: Badge
              - name: variant
                type: string
                label: Variant
              - name: columns
                type: number
                label: Columns
              - name: features
                type: object
                label: Features
                list: true
                fields:
                  - name: title
                    type: string
                    label: Title
                  - name: description
                    type: text
                    label: Description
                  - name: icon
                    type: string
                    label: Icon

      - name: featuresWithButton
        label: Features Block
        fields:
          - name: value
            type: object
            fields:
              - name: title
                type: string
                label: Title
              - name: description
                type: text
                label: Description
              - name: buttonText
                type: string
                label: Button Text
              - name: buttonHref
                type: string
                label: Button Link
              - name: features
                type: object
                label: Features
                list: true
                fields:
                  - name: title
                    type: string
                    label: Title
                  - name: description
                    type: text
                    label: Description
                  - name: icon
                    type: string
                    label: Icon
                  - name: href
                    type: string
                    label: Link

      - name: valueCards
        label: Value Cards
        fields:
          - name: value
            type: object
            fields:
              - name: title
                type: string
                label: Title
              - name: description
                type: text
                label: Description
              - name: badge
                type: string
                label: Badge
              - name: variant
                type: select
                label: Variant
                options:
                  values:
                    - name: cards
                      label: Cards
                    - name: overlay
                      label: Overlay
              - name: cards
                type: object
                label: Cards
                list: true
                fields:
                  - name: title
                    type: string
                    label: Title
                  - name: description
                    type: text
                    label: Description
                  - name: icon
                    type: string
                    label: Icon
                  - name: image
                    type: image
                    label: Image
                    options:
                      media: images
                  - name: imageFit
                    type: select
                    label: Image Fit
                    options:
                      values:
                        - name: cover
                          label: Cover
                        - name: contain
                          label: Contain

      - name: locations
        label: Locations Map
        fields:
          - name: value
            type: object
            fields:
              - name: title
                type: string
                label: Title
              - name: description
                type: text
                label: Description
              - name: badge
                type: string
                label: Badge
              - name: background
                type: select
                label: Background
                options:
                  values:
                    - name: primary-dark
                      label: Primary Dark
                    - name: primary
                      label: Primary
                    - name: gray
                      label: Gray
                    - name: white
                      label: White
              - name: mapUrl
                type: string
                label: Map URL
              - name: variant
                type: select
                label: Variant
                options:
                  values:
                    - name: full
                      label: Full
                    - name: overlay
                      label: Overlay
              - name: locations
                type: object
                label: Locations
                list: true
                fields:
                  - name: name
                    type: string
                    label: Name
                  - name: description
                    type: text
                    label: Description
                  - name: href
                    type: string
                    label: Link

      - name: faq
        label: FAQ
        fields:
          - name: value
            type: object
            fields:
              - name: title
                type: string
                label: Title
              - name: description
                type: text
                label: Description
              - name: badge
                type: string
                label: Badge
              - name: variant
                type: string
                label: Variant
              - name: faqs
                type: object
                label: FAQs
                list: true
                fields:
                  - name: question
                    type: string
                    label: Question
                  - name: answer
                    type: text
                    label: Answer

      - name: cta
        label: Call To Action
        fields:
          - name: value
            type: object
            fields:
              - name: title
                type: string
                label: Title
              - name: description
                type: text
                label: Description
              - name: image
                type: image
                label: Image
                options:
