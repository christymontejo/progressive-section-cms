                    type: string
                    label: Location
              - name: formFields
                type: object
                label: Form Fields
                list: true
                fields:
                  - name: id
                    type: string
                    label: ID
                  - name: name
                    type: string
                    label: Name
                  - name: label
                    type: string
                    label: Label
                  - name: type
                    type: select
                    label: Field Type
                    options:
                      values:
                        - name: text
                          label: Text
                        - name: email
                          label: Email
                        - name: tel
                          label: Tel
                        - name: textarea
                          label: Textarea
