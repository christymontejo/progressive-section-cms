name: Vercel Production Deployment
on:
  push:
    branches:
      - main # Change this to master if your default branch is master
concurrency:
  group: vercel-production-deploy
  cancel-in-progress: true
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_CLI_VERSION: '55.0.0'
jobs:
  Deploy-Production:
    name: Vercel Production Deployment
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install --global vercel@${{ env.VERCEL_CLI_VERSION }}

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        timeout-minutes: 2

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        timeout-minutes: 5

      - name: Deploy Project Artifacts to Vercel
        timeout-minutes: 8
        run: |
          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt of 3"
            if timeout 150 vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}; then
              exit 0
            fi
            echo "Attempt $attempt did not complete within 150s, retrying..."
          done
          echo "All 3 deploy attempts failed"
          exit 1
