                    type: number
                    label: Rows
                  - name: width
                    type: string
                    label: Width

      - name: network
        label: Network
        fields:
          - name: value
            type: object
            fields:
              - name: title
                type: string
                label: Title
              - name: description
                type: text
                label: Description
              - name: networks
                type: object
                label: Networks
                list: true
                fields:
